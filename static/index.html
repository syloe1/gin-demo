<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>gin-demo 测试页</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f4f6f9; color: #333; }
    h1 { background: #4f46e5; color: #fff; padding: 16px 24px; font-size: 18px; }
    .container { display: flex; gap: 16px; padding: 16px; flex-wrap: wrap; }
    .card {
      background: #fff; border-radius: 8px; padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.1); flex: 1 1 340px;
    }
    .card h2 { font-size: 15px; margin-bottom: 12px; color: #4f46e5; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    label { display: block; font-size: 13px; margin-bottom: 4px; color: #555; }
    input {
      width: 100%; padding: 7px 10px; border: 1px solid #ddd;
      border-radius: 5px; font-size: 13px; margin-bottom: 10px;
    }
    button {
      width: 100%; padding: 8px; background: #4f46e5; color: #fff;
      border: none; border-radius: 5px; cursor: pointer; font-size: 14px;
    }
    button:hover { background: #4338ca; }
    .result {
      margin-top: 10px; background: #f8f8f8; border: 1px solid #e2e2e2;
      border-radius: 5px; padding: 10px; font-size: 12px;
      white-space: pre-wrap; word-break: break-all; min-height: 40px; max-height: 160px; overflow-y: auto;
    }
    .token-bar {
      background: #fff; padding: 12px 16px; border-bottom: 1px solid #e5e7eb;
      display: flex; align-items: center; gap: 10px; font-size: 13px;
    }
    .token-bar span { color: #888; }
    #tokenDisplay {
      flex: 1; padding: 6px 10px; border: 1px solid #ddd;
      border-radius: 5px; font-size: 12px; color: #333; background: #f9f9f9;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    .badge.public { background: #dcfce7; color: #16a34a; }
    .badge.private { background: #fee2e2; color: #dc2626; }
  </style>
</head>
<body>

<h1>🚀 gin-demo API 测试页</h1>

<div class="token-bar">
  <span>当前 Token：</span>
  <div id="tokenDisplay">（登录后自动填入）</div>
  <button style="width:auto;padding:6px 14px;font-size:12px" onclick="clearToken()">清除</button>
</div>

<div class="container">

  <!-- 登录 -->
  <div class="card">
    <h2>登录 <span class="badge public">POST /api/login</span></h2>
    <label>用户名（固定 admin）</label>
    <input id="loginName" value="admin" />
    <button onclick="login()">登录 / 获取 Token</button>
    <div class="result" id="loginResult"></div>
  </div>

  <!-- 创建用户 -->
  <div class="card">
    <h2>创建用户 <span class="badge public">POST /api/user</span></h2>
    <label>Name</label>
    <input id="createName" placeholder="张三" />
    <label>Age</label>
    <input id="createAge" type="number" placeholder="25" />
    <button onclick="createUser()">创建</button>
    <div class="result" id="createResult"></div>
  </div>

  <!-- 查询单个用户 -->
  <div class="card">
    <h2>查询用户 <span class="badge public">GET /api/user/:id</span></h2>
    <label>用户 ID</label>
    <input id="getUserId" type="number" placeholder="1" />
    <button onclick="getUser()">查询</button>
    <div class="result" id="getUserResult"></div>
  </div>

  <!-- 用户列表 -->
  <div class="card">
    <h2>用户列表 <span class="badge public">GET /api/users</span></h2>
    <label>Page</label>
    <input id="listPage" type="number" value="1" />
    <label>Page Size</label>
    <input id="listPageSize" type="number" value="10" />
    <button onclick="getUserList()">查询列表</button>
    <div class="result" id="listResult"></div>
  </div>

  <!-- 更新用户 -->
  <div class="card">
    <h2>更新用户 <span class="badge private">PUT /api/user/:id 🔒</span></h2>
    <label>用户 ID</label>
    <input id="updateId" type="number" placeholder="1" />
    <label>Name</label>
    <input id="updateName" placeholder="李四" />
    <label>Age</label>
    <input id="updateAge" type="number" placeholder="30" />
    <button onclick="updateUser()">更新</button>
    <div class="result" id="updateResult"></div>
  </div>

  <!-- 删除用户 -->
  <div class="card">
    <h2>删除用户 <span class="badge private">DELETE /api/user/:id 🔒</span></h2>
    <label>用户 ID</label>
    <input id="deleteId" type="number" placeholder="1" />
    <button onclick="deleteUser()">删除</button>
    <div class="result" id="deleteResult"></div>
  </div>

</div>

<script>
  const BASE = 'http://localhost:10000/api'

  function getToken() {
    return localStorage.getItem('token') || ''
  }

  function setToken(t) {
    localStorage.setItem('token', t)
    document.getElementById('tokenDisplay').textContent = t
  }

  function clearToken() {
    localStorage.removeItem('token')
    document.getElementById('tokenDisplay').textContent = '（登录后自动填入）'
  }

  function show(id, data) {
    document.getElementById(id).textContent = JSON.stringify(data, null, 2)
  }

  async function request(method, path, body, auth = false) {
    const headers = { 'Content-Type': 'application/json' }
    if (auth) headers['Authorization'] = 'Bearer ' + getToken()
    const res = await fetch(BASE + path, {
      method,
      headers,
      body: body ? JSON.stringify(body) : undefined
    })
    return res.json()
  }

  async function login() {
    const name = document.getElementById('loginName').value
    const data = await request('POST', '/login', { name })
    show('loginResult', data)
    if (data.token) setToken(data.token)
  }

  async function createUser() {
    const name = document.getElementById('createName').value
    const age = parseInt(document.getElementById('createAge').value)
    const data = await request('POST', '/user', { name, age })
    show('createResult', data)
  }

  async function getUser() {
    const id = document.getElementById('getUserId').value
    const data = await request('GET', `/user/${id}`)
    show('getUserResult', data)
  }

  async function getUserList() {
    const page = document.getElementById('listPage').value
    const size = document.getElementById('listPageSize').value
    const data = await request('GET', `/users?page=${page}&page_size=${size}`)
    show('listResult', data)
  }

  async function updateUser() {
    const id = document.getElementById('updateId').value
    const name = document.getElementById('updateName').value
    const age = parseInt(document.getElementById('updateAge').value)
    const data = await request('PUT', `/user/${id}`, { name, age }, true)
    show('updateResult', data)
  }

  async function deleteUser() {
    const id = document.getElementById('deleteId').value
    const data = await request('DELETE', `/user/${id}`, null, true)
    show('deleteResult', data)
  }

  // 页面加载时恢复 token
  window.onload = () => {
    const t = getToken()
    if (t) document.getElementById('tokenDisplay').textContent = t
  }
</script>
</body>
</html>
